baseURL = 'https://specdd.ai/'
ignoreFiles = ['\.draft\.', '\.note\.']
disableKinds = ['taxonomy', 'term']
languageCode = 'en-us'
enableGitInfo = true
title = 'SpecDD – Specification-Driven Development framework'

[params]
shortTitle = 'SpecDD'
description = 'SpecDD is a Specification-Driven Development framework that enables humans and AI agents to build better software'
socialImage = '/social.png'
socialImageWidth = 1200
socialImageHeight = 630
socialImageAlt = 'SpecDD - Specification-Driven Development framework'

[params.schema]
name = 'SpecDD'
url = 'https://specdd.ai/'
logo = '/logo-sm.png'
image = '/social.png'
author = 'Matīss Treinis'
author_id = 'matiss-treinis'
same_as = [
  'https://github.com/specdd/specdd',
  'https://github.com/specdd/cli',
]
code_repository = 'https://github.com/specdd/specdd'
application_category = 'DeveloperApplication'
operating_system = 'Cross-platform'
license = 'https://www.apache.org/licenses/LICENSE-2.0'

[params.pageDescriptions]
'/changelog/' = 'SpecDD release notes, framework updates, and changes to the specification-driven development workflow.'
'/language-reference/' = 'SpecDD language reference for the .sdd file format, syntax, sections, task markers, comments, and parsing rules.'

[frontmatter]
lastmod = [':git', 'lastmod', 'modified', 'date', 'publishDate']

[markup.tableOfContents]
startLevel = 2
endLevel = 4
ordered = false

[markup.highlight]
style = 'github'

[pagination]
pagerSize = 10

[module]
[[module.mounts]]
source = "content"
target = "content"

[[module.mounts]]
source = "../README.md"
target = "content/_index.md"

[[module.mounts]]
source = "../CHANGELOG.md"
target = "content/changelog.md"

[[module.mounts]]
source = "../LANGUAGE.md"
target = "content/language-reference.md"

[[module.mounts]]
source = "static"
target = "static"

[[module.mounts]]
source = "../README.md"
target = "static/reference/README.md"

[[module.mounts]]
source = "../CHANGELOG.md"
target = "static/reference/CHANGELOG.md"

[[module.mounts]]
source = "../src"
target = "static/reference/src"

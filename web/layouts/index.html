<!doctype html>
<html lang="en">
<head>
  {{ partial "site-head.html" . }}
</head>
<body class="has-toc">

{{ partial "site-header.html" . }}

<div id="toc-overlay"></div>

<aside id="toc">
  <span id="toc-label">Contents</span>
  <nav>{{ .TableOfContents }}</nav>
</aside>

<main id="content">
  {{ .Content }}
</main>

{{ partial "site-footer.html" . }}

{{ partial "toc-scripts.html" . }}

</body>
</html>
